<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Colegio Visao - Login</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: Arial, sans-serif;
        background-color: #0d1b4b;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }

      .container {
        background-color: #ffffff;
        padding: 40px;
        border-radius: 8px;
        width: 350px;
        text-align: center;
      }

      .container img {
        width: 120px;
        margin-bottom: 20px;
      }

      .container h2 {
        color: #0d1b4b;
        margin-bottom: 20px;
        font-size: 18px;
      }

      .form-group {
        margin-bottom: 15px;
        text-align: left;
      }

      .form-group label {
        display: block;
        margin-bottom: 5px;
        color: #333;
        font-size: 14px;
      }

      .form-group input {
        width: 100%;
        padding: 10px;
        border: 1px solid #ccc;
        border-radius: 4px;
        font-size: 14px;
      }

      .form-group input:focus {
        outline: none;
        border-color: #0d1b4b;
      }

      button {
        width: 100%;
        padding: 10px;
        background-color: #0d1b4b;
        color: white;
        border: none;
        border-radius: 4px;
        font-size: 15px;
        cursor: pointer;
        margin-top: 10px;
      }

      button:hover {
        background-color: #132269;
      }

      #mensagem {
        margin-top: 15px;
        font-size: 14px;
        font-weight: bold;
      }

      .sucesso {
        color: green;
      }

      .erro {
        color: red;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <img src="logo.png" alt="Logo Colegio Visao" />
      <h2>Acesso ao Sistema</h2>

      <div class="form-group">
        <label>Usuário:</label>
        <input type="text" id="usuario" placeholder="Digite seu usuário" />
      </div>

      <div class="form-group">
        <label>Senha:</label>
        <input type="password" id="senha" placeholder="Digite sua senha" />
      </div>

      <button onclick="fazerLogin()">Entrar</button>

      <p id="mensagem"></p>
    </div>

    <script>
      // usuarios cadastrados (simulando um banco de dados)
      var usuarios = [
        { login: "admin", senha: "1234", nome: "Administrador" },
        { login: "joao", senha: "visao123", nome: "Joao Silva" },
        { login: "maria", senha: "maria456", nome: "Maria Souza" },
      ];

      function fazerLogin() {
        var usuario = document.getElementById("usuario").value;
        var senha = document.getElementById("senha").value;
        var mensagem = document.getElementById("mensagem");

        if (usuario == "" || senha == "") {
          mensagem.className = "erro";
          mensagem.textContent = "Preencha todos os campos.";
          return;
        }

        // verifica se o usuario existe
        var encontrado = null;
        for (var i = 0; i < usuarios.length; i++) {
          if (usuarios[i].login == usuario) {
            encontrado = usuarios[i];
            break;
          }
        }

        if (encontrado == null) {
          mensagem.className = "erro";
          mensagem.textContent = "Usuário não encontrado.";
          return;
        }

        // verifica a senha
        if (encontrado.senha != senha) {
          mensagem.className = "erro";
          mensagem.textContent = "Senha incorreta.";
          return;
        }

        // login ok
        mensagem.className = "sucesso";
        window.location.href = "dashboard.html";
        mensagem.textContent =
          "Login efetuado com sucesso! Bem-vindo, " + encontrado.nome + ".";
      }

      // permite usar o Enter para logar
      document.addEventListener("keypress", function (e) {
        if (e.key === "Enter") {
          fazerLogin();
        }
      });
    </script>
  </body>
</html>
